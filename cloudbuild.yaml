steps:
  # ─── Step 1: Build the Docker image ───────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/last-minute-life-saver:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/last-minute-life-saver:latest'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_API_KEY=${_NEXT_PUBLIC_FIREBASE_API_KEY}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_NEXT_PUBLIC_FIREBASE_PROJECT_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_APP_ID=${_NEXT_PUBLIC_FIREBASE_APP_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_VAPID_KEY=${_NEXT_PUBLIC_FIREBASE_VAPID_KEY}'
      - '--build-arg'
      - 'NEXT_PUBLIC_APP_URL=${_NEXT_PUBLIC_APP_URL}'
      - '--cache-from'
      - 'gcr.io/$PROJECT_ID/last-minute-life-saver:latest'
      - '.'

  # ─── Step 2: Push image to Container Registry ─────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/last-minute-life-saver'

  # ─── Step 3: Deploy to Cloud Run ──────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloud-run'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'last-minute-life-saver'
      - '--image'
      - 'gcr.io/$PROJECT_ID/last-minute-life-saver:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--concurrency'
      - '80'
      - '--timeout'
      - '60'
      - '--set-env-vars'
      - 'GEMINI_API_KEY=${_GEMINI_API_KEY},FIREBASE_ADMIN_PROJECT_ID=${_FIREBASE_ADMIN_PROJECT_ID},FIREBASE_ADMIN_CLIENT_EMAIL=${_FIREBASE_ADMIN_CLIENT_EMAIL},NODE_ENV=production'
      - '--set-secrets'
      - 'FIREBASE_ADMIN_PRIVATE_KEY=firebase-admin-private-key:latest'

# ─── Substitution defaults ────────────────────────────────────────────────────
substitutions:
  _REGION: us-central1
  _NEXT_PUBLIC_APP_URL: https://last-minute-life-saver.run.app

# ─── Build configuration ──────────────────────────────────────────────────────
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'

images:
  - 'gcr.io/$PROJECT_ID/last-minute-life-saver:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/last-minute-life-saver:latest'
